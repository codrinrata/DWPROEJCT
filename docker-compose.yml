services:
  mongodb:
    image: mongo:7
    container_name: amip-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: amip-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: acme_dwh
      JAVA_HOME: /usr/lib/jvm/java-17
      SPARK_MASTER: local[1]
      SPARK_DRIVER_MEMORY: 512m
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: >
      sh -c "python scripts/seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  mongodb_data:
